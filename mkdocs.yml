site_name: Topological ML Toolkit
site_description: Graph-first persistent homology and manifold embedding docs for ML practitioners.
site_url: https://teerthsharma.github.io/topological-ml-toolkit/
repo_url: https://github.com/teerthsharma/topological-ml-toolkit
theme:
  name: material
  logo: assets/topological-ml-toolkit-seal.jpeg
  features:
    - navigation.sections
    - navigation.tabs
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
nav:
  - Home: index.md
  - Concepts:
      - Persistent Homology: concepts/persistent-homology.md
      - Topology Landscape: concepts/topology-landscape.md
      - Manifold Embeddings: concepts/manifold-embeddings.md
      - Feature Vectors: concepts/ph-feature-vectors.md
      - Topological Training: concepts/topological-training.md
      - Performance Gates: concepts/performance-gates.md
  - Topology:
      - Foundations: topology/foundations.md
      - Family Coverage Matrix: topology/family-coverage-matrix.md
      - Metric And Function Spaces: topology/metric-and-function-spaces.md
      - Systems Topology: topology/systems-topology.md
      - Geometry And Symmetry: topology/geometry-and-symmetry.md
  - GUI:
      - Dashboard Export: gui/dashboard.md
  - Gallery:
      - Overview: gallery/index.md
      - Noisy Circles: gallery/noisy-circles.md
      - Time Delay: gallery/time-delay.md
      - Mapper And Reeb Activation Maps: gallery/mapper-reeb-activation-map.md
      - Sheaf Consistency Residuals: gallery/sheaf-consistency-residuals.md
      - Covers Nerves And Routing: gallery/covers-nerves-routing.md
      - Persistence Barcode And Betti Curves: gallery/persistence-barcode-betti-curves.md
      - Manifold Embedding Neighborhood Graph: gallery/manifold-embedding-neighborhood-graph.md
      - Backend Runtime Gates: gallery/backend-runtime-gates.md
      - Topology Training Pipeline: gallery/topology-training-pipeline.md
      - TDA Benchmark Evidence Map: gallery/tda-benchmark-evidence-map.md
      - Finite Topology Dynamics And Braids: gallery/finite-topology-dynamics-and-braids.md
  - Benchmarks:
      - Benchmark Policy: benchmarks/index.md
      - E2E Claim Gate: benchmarks/e2e-claims.md
  - Backends:
      - Backend Roadmap: backends/roadmap.md
      - Compatibility Matrix: backends/compatibility.md
      - Language Mix: backends/language-mix.md
  - Reference:
      - API: reference/api.md
      - Contribution Standard: reference/contributing.md
